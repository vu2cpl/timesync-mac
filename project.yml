name: TimeSync
options:
  bundleIdPrefix: com.vu2cpl
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: CHVNJ85C9F
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
    ENABLE_HARDENED_RUNTIME: YES
    OTHER_CODE_SIGN_FLAGS: "--timestamp --options=runtime"
    # Without this, Xcode auto-injects com.apple.security.get-task-allow (the debugger
    # entitlement). That's fine for local dev but Apple rejects notarization for any
    # binary that requests it. We explicitly disable injection so our entitlements
    # files are the sole source of truth.
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    GENERATE_INFOPLIST_FILE: NO
    PRODUCT_NAME: $(TARGET_NAME)
    MARKETING_VERSION: "0.1.2"
    CURRENT_PROJECT_VERSION: "3"
    ARCHS: "$(ARCHS_STANDARD)"
    ONLY_ACTIVE_ARCH: YES

targets:
  TimeSync:
    type: application
    platform: macOS
    sources:
      - path: TimeSync
      - path: Shared
      - path: LaunchDaemons/com.vu2cpl.TimeSync.Helper.plist
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchDaemons
    dependencies:
      - target: TimeSyncHelper
        copy:
          destination: executables
    info:
      path: TimeSync/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        CFBundleName: TimeSync
        CFBundleDisplayName: TimeSync
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: "© 2026 VU2CPL"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vu2cpl.TimeSync
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: TimeSync/TimeSync.entitlements

  TimeSyncHelper:
    type: tool
    platform: macOS
    sources:
      - path: TimeSyncHelper
        excludes:
          - "*.plist"
          - "*.entitlements"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vu2cpl.TimeSync.Helper
        PRODUCT_NAME: TimeSyncHelper
        CREATE_INFOPLIST_SECTION_IN_BINARY: YES
        INFOPLIST_FILE: TimeSyncHelper/Helper-Info.plist
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: TimeSyncHelper/TimeSyncHelper.entitlements
