name: TimeSync
options:
  bundleIdPrefix: com.vu2cpl
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: CHVNJ85C9F
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
    ENABLE_HARDENED_RUNTIME: NO
    GENERATE_INFOPLIST_FILE: NO
    PRODUCT_NAME: $(TARGET_NAME)
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ARCHS: "$(ARCHS_STANDARD)"
    ONLY_ACTIVE_ARCH: YES

targets:
  TimeSync:
    type: application
    platform: macOS
    sources:
      - path: TimeSync
      - path: Shared
      - path: LaunchDaemons/com.vu2cpl.TimeSync.Helper.plist
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchDaemons
    dependencies:
      - target: TimeSyncHelper
        copy:
          destination: executables
    info:
      path: TimeSync/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        CFBundleName: TimeSync
        CFBundleDisplayName: TimeSync
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: "© 2026 VU2CPL"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vu2cpl.TimeSync
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  TimeSyncHelper:
    type: tool
    platform: macOS
    sources:
      - path: TimeSyncHelper
        excludes:
          - "*.plist"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vu2cpl.TimeSync.Helper
        PRODUCT_NAME: TimeSyncHelper
        CREATE_INFOPLIST_SECTION_IN_BINARY: YES
        INFOPLIST_FILE: TimeSyncHelper/Helper-Info.plist
        SKIP_INSTALL: YES
        ENABLE_HARDENED_RUNTIME: NO
