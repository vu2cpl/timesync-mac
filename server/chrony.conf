# /opt/homebrew/etc/chrony.conf — VU2CPL shack NTP server
# Installed by claude on 2026-05-09.

# --- GPS via gpsd (stratum 1) -----------------------------------------------
# gpsd writes time samples to SHM segment NTP0 (key 0x4e545030). Without PPS we
# trust it to ~100 ms; offset accounts for typical NMEA/USB-serial latency.
# No `prefer` flag — chrony auto-selects the most accurate source. When the
# internet pool is reachable it'll usually win (NMEA-only GPS is ~100ms,
# internet RTT/2 is ~5-50ms). When internet is down, GPS becomes the only
# selectable source and chrony disciplines the clock from it. That's what
# we want for remote FT8 operation.
refclock SHM 0 refid GPS precision 1e-1 offset 0.100 delay 0.2

# --- Upstream sources (fallback / sanity check) -----------------------------
# Use the regional pool (lower RTT than global pool.ntp.org).
pool in.pool.ntp.org    iburst maxsources 4
pool 0.pool.ntp.org     iburst maxsources 2
pool time.apple.com     iburst maxsources 1

# --- Serve to local LAN -----------------------------------------------------
allow 192.168.1.0/24

# If all upstream sources are unreachable (internet down), keep serving the
# local clock at this stratum so downstream clients don't reject us.
local stratum 8

# --- Clock discipline -------------------------------------------------------
# Allow the very first sync to step the clock if it's >1s off, then only slew.
makestep 1.0 3
# Sync the RTC (kernel) periodically.
rtcsync

# --- State files ------------------------------------------------------------
driftfile /opt/homebrew/var/lib/chrony/drift
logdir    /opt/homebrew/var/log/chrony
log       measurements statistics tracking
pidfile   /opt/homebrew/var/run/chrony/chronyd.pid

# Where chronyc talks to chronyd (default /var/run/chrony isn't writable on macOS).
bindcmdaddress /opt/homebrew/var/run/chrony/chronyd.sock

# --- Misc -------------------------------------------------------------------
# Listen on all interfaces (default behaviour) on UDP/123.
# leapsectz right/UTC   # uncomment if you want leap-second-aware kernel time
